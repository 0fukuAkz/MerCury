services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://mercury:mercury@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      # Rate-limit storage. memory:// loses all state on restart and cannot be
      # shared across workers — Redis is the production default. Override only
      # if you genuinely intend a single-worker, ephemeral-state deploy.
      - RATE_LIMIT_STORAGE=${RATE_LIMIT_STORAGE:-redis://redis:6379/0}
      # Boot-time alembic upgrade is OFF by default in production (see app.py).
      # The `migrations` service below applies them once before web starts.
    depends_on:
      - db
      - redis
      - migrations
    restart: unless-stopped

  # One-shot: apply pending Alembic migrations before the web service starts.
  # Replaces the previous boot-time inline `alembic upgrade head`, which would
  # race under multi-worker deploys.
  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql://mercury:mercury@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
    depends_on:
      - db
    restart: "no"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mercury
      - POSTGRES_PASSWORD=mercury
      - POSTGRES_DB=mercury
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Persistence isn't required for rate-limit counters; restart resets are
    # acceptable. Add a volume here if you also use redis for other state.
    restart: unless-stopped

volumes:
  postgres_data:
