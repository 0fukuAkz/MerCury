services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://mercury:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      # First-admin bootstrap. All three are required together — the app
      # refuses to auto-create an admin user without them and you'll be
      # locked out of the web UI on first boot.
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      # Tracking pixel/click links are built against this URL. Required
      # whenever a campaign opts into tracking; TrackingService raises at
      # construction time if neither this nor an explicit base_url is set.
      - TRACKING_BASE_URL=${TRACKING_BASE_URL:?TRACKING_BASE_URL must be set (e.g. https://mail.yourdomain.com)}
      # Rate-limit storage. memory:// loses all state on restart and cannot be
      # shared across workers — Redis is the production default. Override only
      # if you genuinely intend a single-worker, ephemeral-state deploy.
      - RATE_LIMIT_STORAGE=${RATE_LIMIT_STORAGE:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0}
      # SocketIO async backend must agree with the gunicorn worker class.
      # The Dockerfile CMD uses --worker-class eventlet, so we need eventlet
      # mode here. The default in src/ is 'threading' (dev-friendly); this
      # is the production opt-in. Without it, live-progress events queue
      # but never reach connected browsers.
      - SOCKETIO_ASYNC_MODE=eventlet
      # Boot-time alembic upgrade is OFF by default in production (see app.py).
      # The `migrations` service below applies them once before web starts.
    depends_on:
      - db
      - redis
      - migrations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # One-shot: apply pending Alembic migrations before the web service starts.
  # Replaces the previous boot-time inline `alembic upgrade head`, which would
  # race under multi-worker deploys.
  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql://mercury:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
    depends_on:
      - db
    restart: "no"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mercury
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=mercury
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    # Persistence isn't required for rate-limit counters; restart resets are
    # acceptable. Add a volume here if you also use redis for other state.
    restart: unless-stopped

volumes:
  postgres_data:
