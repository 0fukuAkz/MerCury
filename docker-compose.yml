# MerCury production topology. Postgres (not SQLite) + Redis (not the in-memory
# limiter) satisfy create_app's production preflight out of the box; a one-shot
# `migrations` service applies the schema before `web` starts.
#
# `web` speaks plain HTTP and is published on 127.0.0.1 only — front it with a
# TLS-terminating reverse proxy. An optional Caddy proxy is wired under the
# `proxy` profile:  docker compose --profile proxy up -d   (see deploy/Caddyfile).

services:
  web:
    build: .
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - PORT=5050
      - DATABASE_URL=postgresql://mercury:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      # First-admin bootstrap. All three are required together — the app
      # refuses to auto-create an admin user without them and you'll be locked
      # out of the web UI on first boot.
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      # Tracking pixel/click links are built against this URL. Required whenever
      # a campaign opts into tracking; TrackingService raises at construction
      # time if neither this nor an explicit base_url is set.
      - TRACKING_BASE_URL=${TRACKING_BASE_URL:?TRACKING_BASE_URL must be set (e.g. https://mail.yourdomain.com)}
      # Redis-backed rate limiting — durable across restarts and the production
      # default the preflight expects.
      - RATE_LIMIT_STORAGE=${RATE_LIMIT_STORAGE:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0}
      # SocketIO async backend must agree with the gunicorn eventlet worker
      # class. Without this, live-progress events queue but never reach browsers.
      - SOCKETIO_ASYNC_MODE=eventlet
      # Optional observability — safe to leave unset.
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - API_KEYS=${API_KEYS:-}
      # Worker tier opt-in: set both to enqueue campaigns to the `worker`
      # service (docker compose --profile worker up) instead of running them
      # in-process. Default (inprocess) keeps the single-process setup.
      - CAMPAIGN_EXECUTION_MODE=${CAMPAIGN_EXECUTION_MODE:-inprocess}
      - SOCKETIO_MESSAGE_QUEUE=${SOCKETIO_MESSAGE_QUEUE:-}
    ports:
      # Loopback only — reach it through the proxy. Change to "5050:5050" for
      # direct (untrusted, no TLS) exposure during testing.
      - "127.0.0.1:5050:5050"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    init: true
    restart: unless-stopped
    # Liveness uses the image's built-in HEALTHCHECK (stdlib probe, no curl).

  # One-shot: apply pending Alembic migrations before web starts. Boot-time
  # inline migration is OFF in production (see app.py), so this is the schema
  # gate — `web` waits for it to complete successfully.
  migrations:
    build: .
    command: ["mercury", "db", "migrate"]
    environment:
      - DATABASE_URL=postgresql://mercury:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mercury
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=mercury
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercury -d mercury"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      # PING requires auth once requirepass is set, so pass the password in.
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Persistence isn't required for rate-limit counters; restart resets are
    # acceptable. Add a volume here if you also use redis for other state.
    restart: unless-stopped

  # Optional TLS-terminating reverse proxy. Enable with:
  #   docker compose --profile proxy up -d
  # Edit deploy/Caddyfile with your real domain first — Caddy then provisions
  # and renews Let's Encrypt certificates automatically.
  proxy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  # Optional campaign worker tier. Enable with:
  #   docker compose --profile worker up -d
  # ...and set CAMPAIGN_EXECUTION_MODE=worker + SOCKETIO_MESSAGE_QUEUE on `web`
  # (via .env) so the web tier enqueues instead of running campaigns in-process.
  worker:
    build: .
    profiles: ["worker"]
    command: ["arq", "mercury.worker.tasks.WorkerSettings"]
    environment:
      - DATABASE_URL=postgresql://mercury:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/mercury
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - SOCKETIO_MESSAGE_QUEUE=${SOCKETIO_MESSAGE_QUEUE:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0}
      - CAMPAIGN_QUEUE_REDIS=${CAMPAIGN_QUEUE_REDIS:-redis://:${REDIS_PASSWORD}@redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    init: true
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
