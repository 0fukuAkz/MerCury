{% extends "base.html" %}

{% block title %}Bounces - MerCury{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Bounce Management</h1>
    <p class="page-description">View bounce records</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Total Bounces</div>
        <div class="stat-value error" id="total-bounces">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Hard Bounces</div>
        <div class="stat-value error" id="hard-bounces">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Soft Bounces</div>
        <div class="stat-value warning" id="soft-bounces">0</div>
    </div>
</div>

<!-- Recent Bounces -->
<div class="card" id="bounces-panel">
    <div class="card-header">
        <h2 class="card-title">Recent Bounces</h2>
        <button type="button" class="btn btn-secondary" onclick="loadBounces()">Refresh</button>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Email</th>
                <th>Type</th>
                <th>Category</th>
                <th>Reason</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="bounces-table">
            <tr>
                <td colspan="5" class="text-muted">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>

<script nonce="{{ csp_nonce }}">
    async function loadBounces() {
        try {
            const [bouncesResp, statsResp] = await Promise.all([
                fetch('/api/bounces'),
                fetch('/api/bounces/stats')
            ]);

            const bouncesData = await bouncesResp.json();
            const statsData = await statsResp.json();

            document.getElementById('total-bounces').textContent = statsData.total_bounces || 0;
            document.getElementById('hard-bounces').textContent = statsData.hard_bounces || 0;
            document.getElementById('soft-bounces').textContent = statsData.soft_bounces || 0;
            const bounces = bouncesData.bounces || [];
            const tbody = document.getElementById('bounces-table');

            if (bounces.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No bounces recorded</td></tr>';
                return;
            }

            tbody.innerHTML = bounces.map(b => `
                <tr>
                    <td class="font-mono">${b.email}</td>
                    <td>
                        <span class="badge ${b.bounce_type === 'hard' ? 'badge-error' : 'badge-warning'}">
                            ${b.bounce_type}
                        </span>
                    </td>
                    <td><span class="badge badge-info">${b.category}</span></td>
                    <td>${b.reason || '-'}</td>
                    <td>${new Date(b.timestamp).toLocaleString()}</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Failed to load bounces:', e);
        }
    }

    // Load data on page load
    loadBounces();
</script>
{% endblock %}
