# Unified Sender - Placeholders Configuration
# This file defines static placeholders and documents available built-in tags.

# ==============================================================================
# USER-DEFINED PLACEHOLDERS
# ==============================================================================
# Add your custom static placeholders below.
# These values will replace {{key}} in your templates (subject and body).
#
# Rules:
# 1. Keys must be alphanumeric strings (underscores allowed).
# 2. Values must be strings.
# 3. These override built-in placeholders if they share the same name.
#
# Example:
#   company_phone: "+1-555-0199" -> replaces {{company_phone}}
#   season_offer: "Spring Sale"  -> replaces {{season_offer}}

company_name: "Your Company Name"
support_email: "support@example.com"
website_url: "https://www.example.com"
office_address: "123 Business Rd, Tech City, TC 90210"


# ==============================================================================
# BUILT-IN PLACEHOLDERS REFERENCE (READ-ONLY)
# ==============================================================================
# These placeholders are automatically generated by the system for each email.
# You do NOT need to define them above. Just use them in your templates.

# --- Recipient Information ---
# Derived from your recipient list (CSV/Database)
# {{email}}            - Recipient's full email address
# {{first_name}}       - First name (from data or inferred from email)
# {{last_name}}        - Last name (from data or inferred from email)
# {{full_name}}        - Full name
# {{company}}          - Company name
# {{domain}}           - Email domain (e.g., "gmail.com")
# {{domain_name}}      - Domain without TLD (e.g., "gmail")
# {{username}}         - Local part of email (e.g., "john.doe" from "john.doe@gmail.com")
# {{initials}}         - Initials of first and last name (e.g., "JD")

# --- Date & Time ---
# Based on the time of sending (UTC/Server time)
# {{date}}             - YYYY-MM-DD (e.g., 2023-12-25)
# {{date_formatted}}   - Month DD, YYYY (e.g., December 25, 2023)
# {{date_short}}       - MM/DD/YYYY
# {{date_eu}}          - DD/MM/YYYY
# {{time}}             - HH:MM:SS
# {{year}}             - Current year (YYYY)
# {{month}}            - Current month (MM)
# {{day}}              - Current day (DD)
# {{day_name}}         - Full day name (e.g., Monday)
# {{quarter}}          - Current Quarter (e.g., Q4)

# --- Tracking & System ---
# {{uuid}}             - Unique UUID for this message
# {{short_id}}         - First 8 chars of UUID
# {{tracking_id}}      - ID used for open/click tracking
# {{link}}             - Main action link (if provided in campaign config)
# {{qr_code}}          - HTML <img> tag with QR code of the link (if enabled)
# {{qr_code_url}}      - Raw Data URL of the QR code image

# --- Randomization (Anti-Spam / AB Testing) ---
# {{random_number}}    - Random 4-digit number
# {{random_6}}         - Random 6-digit number
# {{random_8}}         - Random 8-digit number

# --- Mock Data (Faker) ---
# Available if the 'faker' library is installed. Useful for testing.
# {{random_name}}      - A random full name
# {{random_email}}     - A random email address
# {{random_company}}   - A random company name
# {{random_city}}      - A random city
# {{random_text}}      - Random text snippet (approx 100 chars)

# ==============================================================================
# LOGIC & FORMATTING
# ==============================================================================
# 1. Conditionals:
#    {{if:first_name}}Hello {{first_name}}!{{else}}Hello Friend!{{endif}}
#
# 2. Includes:
#    {{include:header.html}} - Includes content from another file in the template dir.
#
# 3. Fallbacks:
#    If a tag is not found (e.g., {{custom_tag}}), it is left as-is in the email
#    so you can spot missing data. It does NOT disappear.
