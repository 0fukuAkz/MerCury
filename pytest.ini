[pytest]
# Pytest configuration for MerCury

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
# asyncio_default_fixture_loop_scope = session

# Ignore E2E by default to avoid background thread conflicts on Windows
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/mercury
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=85
    -p no:warnings
    --ignore=tests/e2e

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    asyncio: marks tests as async

# Coverage settings
[coverage:run]
source = src/mercury
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

