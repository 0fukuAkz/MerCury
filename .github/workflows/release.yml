  #   if: startsWith(github.ref, 'refs/tags/v')
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write        # OIDC for PyPI Trusted Publishing
  #   steps:
  #     - uses: actions/checkout@v4
