name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Editable install so `import mercury` resolves during pytest collection.
        # The package layout uses src/ so without this the conftest fails with
        # ModuleNotFoundError: No module named 'mercury'.
        pip install -e . --no-deps
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
    
    # src/ is mypy-clean (zero errors); enforce that going forward.
    # --ignore-missing-imports stays off — the pyproject [tool.mypy] overrides
    # plus installed type stubs handle the third-party imports.
    - name: Type check with mypy
      run: |
        mypy src/
    
    - name: Test with pytest
      run: |
        pytest --cov=src/mercury --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  migrations:
    name: Migration check (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mercury
          POSTGRES_PASSWORD: mercury
          POSTGRES_DB: mercury
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mercury -d mercury"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e . --no-deps

    # Run the FULL Alembic chain against a real Postgres, then assert the
    # migrated schema matches the models. Catches migration/model drift that the
    # SQLite test suite (which builds its schema via create_all) cannot see —
    # exactly the class of bug that broke the 2.0 Postgres deploy path.
    - name: Alembic upgrade + drift check (Postgres)
      env:
        DATABASE_URL: postgresql://mercury:mercury@localhost:5432/mercury
      run: |
        alembic upgrade head
        alembic check

  migrations-sqlite:
    name: Migration check (SQLite)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e . --no-deps

    # The default personal/desktop install path is `mercury db migrate` on
    # SQLite. The Postgres check above can't catch SQLite-specific breakage —
    # e.g. a batch drop_constraint by a Postgres-style FK name that SQLite
    # (which doesn't name FK constraints) can't resolve. Run the full chain on a
    # fresh SQLite file so that regression is caught here, not by a user's first
    # install.
    - name: Alembic upgrade head (SQLite)
      env:
        DATABASE_URL: sqlite:///ci_migrations_sqlite.db
      run: |
        alembic upgrade head

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json
      continue-on-error: true
  
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security, migrations, migrations-sqlite]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install build tools
      run: |
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

