name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Editable install so `import mercury` resolves during pytest collection.
        # The package layout uses src/ so without this the conftest fails with
        # ModuleNotFoundError: No module named 'mercury'.
        pip install -e . --no-deps
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
    
    # Ratchet gate: blocks only on NEW type errors over .mypy_baseline, so
    # the existing (grandfathered) debt doesn't fail CI but new regressions
    # do. Drops --ignore-missing-imports: the pyproject [tool.mypy] overrides
    # + installed type stubs now handle missing imports, so this count
    # matches `make type-check-ci` locally. Regenerate the baseline when the
    # pinned mypy version changes.
    - name: Type check with mypy (baseline ratchet)
      run: |
        bash scripts/mypy_gate.sh
    
    - name: Test with pytest
      run: |
        pytest --cov=src/mercury --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
  
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json
      continue-on-error: true
  
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install build tools
      run: |
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

